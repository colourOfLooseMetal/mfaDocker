<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seinfeld Phrase Generator</title>
  <script>
    // Theme switch: ?theme=kitsch (default) | clean
    const theme = new URLSearchParams(location.search).get("theme") || "kitsch";
    const l = document.createElement("link");
    l.rel = "stylesheet";
    l.href = `themes/${theme}.css`;
    document.head.appendChild(l);
    document.documentElement.dataset.theme = theme;
  </script>
  <!-- ffmpeg.wasm UMD globals (window.FFmpegUtil / window.FFmpegWASM),
       vendored locally so the engine loads same-origin / offline. -->
  <script src="ffmpeg/util.js"></script>
  <script src="ffmpeg/ffmpeg.js"></script>
  <script type="module" src="js/app.js"></script>
</head>
<body>
  <div class="page">
    <!-- <div class="theme-switch">
      theme:
      <a href="?theme=kitsch">90s</a> ·
      <a href="?theme=clean">clean</a>
    </div> -->

    <header class="masthead">
      <h1 class="logo">Seinfeld</h1>
      <p class="tagline">Phrase Generator</p>
      <marquee class="kitsch-only" scrollamount="6">
        Im shifting into soup mode.
      </marquee>
    </header>

    <main class="panel">
      <p id="engine-status" class="engine">loading video engine…</p>

      <div class="row">
        <label for="word-input">Word or phrase:</label>
        <input id="word-input" type="text" autocomplete="off" placeholder="type a word or phrase…">
        <button id="add-btn">Add</button>
      </div>

      <ul id="suggestions" class="suggestions"></ul>

      <fieldset class="sentence">
        <legend>Your sentence</legend>
        <ul id="selected" class="selected"></ul>
        <button id="clear-btn">Clear</button>
      </fieldset>

      <div class="row gap-row">
        <label for="gap">Gap between words:</label>
        <input id="gap" type="range" min="0" max="0.7" step="0.01" value="0.1">
        <span id="gap-label" class="gap-label">100 ms</span>
      </div>
      <div class="row gap-presets">
        <span class="gap-presets-label">Override gap:</span>
        <button type="button" class="preset-btn" data-gap="0">No pause (0 ms)</button>
        <button type="button" class="preset-btn" data-gap="0.3">Medium pause (300 ms)</button>
        <button type="button" class="preset-btn" data-gap="0.7">Long pause (700 ms)</button>
      </div>

      <div class="row build-row">
        <button id="build-btn" class="build" disabled>Build Video</button>
        <span id="status" class="status"></span>
      </div>

      <div id="result" class="result" hidden>
        <video id="preview" class="preview" controls></video>
        <p><a id="download" class="download" download>⬇ Download your mashup</a></p>
      </div>
    </main>

    <footer class="footer">
      <!-- <p class="kitsch-only">
        <span class="counter">visitors: 0000147</span> &nbsp;|&nbsp;
        🚧 under construction 🚧 &nbsp;|&nbsp; Best viewed in Netscape Navigator 3.0
      </p>
      <p>yada yada yada</p> -->
    </footer>
  </div>
</body>
</html>
